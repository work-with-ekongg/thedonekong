{% extends "base.html" %}
{% block title %}Don Ekong - Projects{% endblock %}

{% block content %}
    <h1>The Showroom</h1>

    <div class="projects">
        {% for project in projects %}
            <div class="project-card">
                <img src="{{ url_for('static', filename='images/' + project.image) }}" alt="{{ project.name }}">
                <h2>{{ project.title }}</h2>
                <p>{{ project.description }}</p>
            </div>
        {% endfor %}
    </div>
{% endblock %}
